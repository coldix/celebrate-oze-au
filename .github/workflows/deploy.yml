name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: 46.202.196.151
          SSH_PORT: 65002
          SSH_USER: u566466219
          REMOTE_PATH: /home/u566466219/domains/celebrate.oze.au/public_html/
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Trust the host
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Sync files — exclude dev/local-only files
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.DS_Store' \
            --exclude='*.env' \
            --exclude='deploy.sh' \
            --exclude='README.md' \
            --exclude='SETUP.md' \
            --exclude='.gitignore' \
            --exclude='legal/generate_consent_pdf.py' \
            ./ $SSH_USER@$SSH_HOST:$REMOTE_PATH

          echo "Deploy complete → https://celebrate.oze.au"
